<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رحلة الإيمان - البوابة الرئيسية</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700;900&family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Tajawal', sans-serif;
    height: 100vh;
    overflow: hidden;
    background-color: #000;
}

#firstScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: url("/static/makk.PNG");
    background-size: cover;
    background-position: center;
    z-index: 2000;
}

.big-kaaba {
    font-size: 8rem;
    cursor: pointer;
    transition: 0.3s;
    user-select: none;
}

.big-kaaba:hover {
    transform: scale(1.1);
}

#secondScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    color: white;
}

#bgVideo {
    position: fixed;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index: -1;
}

.verse {
    font-family: 'Amiri', serif;
    font-size: 4rem;
    font-weight: 900;
    margin-bottom: 20px;
    text-shadow:
        -1px -1px 0 #000,
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000,
        0 0 20px rgba(0,0,0,0.7);
    position: relative;
    z-index: 1;
}

.welcome {
    font-size: 2rem;
    margin-bottom: 40px;
    font-weight: 700;
    text-shadow:
        -1px -1px 0 #000,
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000,
        0 0 20px rgba(0,0,0,0.7);
    position: relative;
    z-index: 1;
}

.enter-btn {
    font-size: 6rem;
    cursor: pointer;
    transition: 0.3s;
    text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000,
        0 0 30px rgba(0,0,0,0.8);
    position: relative;
    z-index: 1;
    user-select: none;
}

.enter-btn:hover {
    transform: scale(1.1);
}

#cardsScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    background-image: url("/static/makk.PNG");
    background-size: cover;
    background-position: center;
    z-index: 1000;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    width: 80%;
    max-width: 900px;
}

@media(max-width: 768px) {
    .grid { grid-template-columns: 1fr; gap: 15px; }
}

.card {
    background-image: url("/static/IMG_9826.jpg");
    background-size: cover;
    background-position: center;
    padding: 70px 30px;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
    font-weight: 800;
    font-size: 1.6rem;
    text-align: center;
    color: white;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 180px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    border-radius: 20px;
    transition: 0.3s;
}

.card:hover::before {
    background: rgba(0, 0, 0, 0.35);
}

.card span {
    position: relative;
    z-index: 2;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
}

.custom-alert-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 5000;
    animation: fadeIn 0.3s ease;
}

.custom-alert-box {
    background: #ffffff;
    width: 90%;
    max-width: 500px;
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    border: 1px solid rgba(0,0,0,0.1);
    text-align: center;
    transform: scale(0.9);
    transition: transform 0.3s ease;
}

.custom-alert-title {
    font-size: 1.4rem;
    font-weight: 800;
    color: #111;
    margin-bottom: 15px;
}

.custom-alert-message {
    font-size: 1.05rem;
    color: #444;
    line-height: 1.6;
    margin-bottom: 25px;
    font-weight: 600;
}

.custom-alert-btn {
    background: #000000;
    color: #ffffff;
    border: none;
    padding: 12px 35px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
}

.custom-alert-btn:hover {
    background: #333333;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>
<body>

<div id="firstScreen">
    <div class="big-kaaba" onclick="goToSecond()">🕋</div>
</div>
<div style="text-align:center; margin-top:15px;">
    
    <div style="
        font-size:55px;
        color:black;
        line-height:1;
    ">
        ↓
    </div>

    <p style="
        color:black;
        font-size:22px;
        font-weight:900;
        margin-top:5px;
        text-shadow:0 0 5px rgba(255,255,255,0.8);
    ">
        اضغط هنا
    </p>

</div>
<div id="secondScreen">
    <video id="bgVideo" loop muted playsinline>
        <source src="/static/3905451405-preview.mp4" type="video/mp4">
    </video>
    <div class="verse">( وَأَذِّن فِي النَّاسِ بِالْحَجِّ )</div>
    <div class="welcome">أهــلاً وسهــلاً ضــيف الرحـــمن</div>
    <div class="enter-btn" onclick="showCards()">🕋</div>
</div>

<div id="cardsScreen">
    <div class="grid">
        <div class="card" onclick="goToPage('/pilgrim-dashboard')">
            <span>الحجـاج</span>
        </div>
        <div class="card" onclick="goToPage('/employee-dashboard')">
            <span>الموظـفين</span>
        </div>
        <div class="card" onclick="goToPage('/public-weather')">
            <span>الافـراد</span>
        </div>
        <div class="card" onclick="goToPage('/emergency')">
            <span>الطـوارئ والإسعـاف</span>
        </div>
    </div>
</div>

<div id="customAlert" class="custom-alert-overlay">
    <div class="custom-alert-box" id="customAlertBox">
        <div class="custom-alert-title" id="customAlertTitle">تنبيه النظام</div>
        <div class="custom-alert-message" id="customAlertMessage"></div>
        <button class="custom-alert-btn" onclick="closeCustomAlert()">موافق</button>
    </div>
</div>

<audio id="audio">
    <source src="/static/talbiyah.mov" type="audio/mp4">
    <source src="/static/talbiyah.mov" type="audio/quicktime">
</audio>

<script>
    const _supabase = supabase.createClient(
        'https://rmpmbnmmgxsbxcvcbkwb.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcG1ibm1tZ3hzYnhjdmNia3diIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3ODcwMzgsImV4cCI6MjA4NzM2MzAzOH0.Piu2jTOwdfihFgEsELJyTHXChGgV95abKAy4-9lsAHc',
        { auth: { persistSession: false } }
    );

function showCustomAlert(title, message) {
    document.getElementById('customAlertTitle').innerText = title;
    document.getElementById('customAlertMessage').innerText = message;
    const alertOverlay = document.getElementById('customAlert');
    alertOverlay.style.display = 'flex';
    setTimeout(() => {
        document.getElementById('customAlertBox').style.transform = 'scale(1)';
    }, 10);
}

function closeCustomAlert() {
    document.getElementById('customAlertBox').style.transform = 'scale(0.9)';
    setTimeout(() => {
        document.getElementById('customAlert').style.display = 'none';
    }, 150);
}

function goToSecond() {
    document.getElementById("firstScreen").style.display = "none";
    document.getElementById("secondScreen").style.display = "flex";

    const video = document.getElementById("bgVideo");
    if(video) video.play().catch(e => console.log("تعذر تشغيل الفيديو تلقائياً"));

    const audio = document.getElementById("audio");
    if(audio) {
        audio.play().catch(function(error) {
            showCustomAlert("⚙️ إشعار الوسائط", "تشغيل صوت التلبية تلقائياً واجه قيود المتصفح الحالية.");
        });
    }
}

function showCards() {
    document.getElementById("secondScreen").style.display = "none";
    const audio = document.getElementById("audio");
    if(audio) audio.pause();
    document.getElementById("cardsScreen").style.display = "flex";
}

function goToPage(url) {
    window.location.href = url;
}
</script>

</body>
</html>
