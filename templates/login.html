<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة تسجيل الدخول - منظومة مكة الصحية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Cairo:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            min-height: 100vh;
            background-image: url('/static/makk.PNG');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #000000;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: #000;
            margin-bottom: 10px;
        }

        .login-header p {
            font-size: 14px;
            color: #555;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 900;
            font-size: 15px;
            color: #000;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #000;
            font-weight: 900;
            font-size: 16px;
            background: #fff;
            outline: none;
            transition: 0.2s;
        }

        .form-control:focus {
            background: #fbfbfb;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
        }

        .btn-submit {
            width: 100%;
            background: #000;
            color: #fff;
            border: 2px solid #000;
            padding: 12px;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #fff;
            color: #000;
        }

        .error-banner {
            background: #ffcccc;
            border: 2px solid #8b0000;
            color: #8b0000;
            padding: 12px;
            margin-bottom: 20px;
            font-weight: 900;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <h1>منظومة مكة الذكية</h1>
        <p>بوابة الوصول الموحدة للفرق الطبية والقيادية</p>
    </div>

    {% if error %}
    <div class="error-banner">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login">
        <div class="form-group">
            <label for="username">اسم المستخدم</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="أدخل اسم المستخدم المعياري" required autocomplete="off">
        </div>

        <div class="form-group">
            <label for="password">كلمة المرور الآمنة</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-submit">تسجيل الدخول إلى النظام</button>
    </form>
</div>

</body>
</html>
